<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Reclamos — RMN</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0d0f14;--surface:#13161e;--border:#252a38;
      --accent:#4f7cff;--success:#10b981;--text:#e8ecf4;--text2:#8892aa;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
         min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .bg-grid{position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(rgba(79,124,255,.04) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(79,124,255,.04) 1px,transparent 1px);
      background-size:48px 48px;}
    .bg-glow{position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(79,124,255,.12),transparent 70%);}
    .container{position:relative;z-index:1;display:flex;flex-direction:column;
      align-items:center;gap:48px;padding:40px 24px;animation:fadeUp .6s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .logo{display:flex;flex-direction:column;align-items:center;gap:8px;}
    .logo-icon{width:56px;height:56px;border-radius:16px;
      background:linear-gradient(135deg,var(--accent),#7c3aed);
      display:flex;align-items:center;justify-content:center;font-size:28px;
      box-shadow:0 0 40px rgba(79,124,255,.3);}
    h1{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;
       letter-spacing:-.02em;text-align:center;}
    h1 span{color:var(--accent);}
    .subtitle{color:var(--text2);font-size:.875rem;letter-spacing:.04em;text-transform:uppercase;}
    .cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
    .role-card{width:240px;padding:32px 24px;background:var(--surface);
      border:1px solid var(--border);border-radius:20px;cursor:pointer;
      text-decoration:none;color:inherit;
      display:flex;flex-direction:column;align-items:center;gap:16px;
      transition:all .25s ease;position:relative;overflow:hidden;}
    .role-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;}
    .role-card.admin::before{background:linear-gradient(135deg,rgba(79,124,255,.08),transparent);}
    .role-card.medico::before{background:linear-gradient(135deg,rgba(16,185,129,.08),transparent);}
    .role-card:hover{transform:translateY(-4px);border-color:transparent;}
    .role-card.admin:hover{box-shadow:0 0 0 1px var(--accent),0 16px 48px rgba(79,124,255,.2);}
    .role-card.medico:hover{box-shadow:0 0 0 1px var(--success),0 16px 48px rgba(16,185,129,.2);}
    .role-card:hover::before{opacity:1;}
    .card-icon{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;}
    .admin .card-icon{background:rgba(79,124,255,.12);}
    .medico .card-icon{background:rgba(16,185,129,.12);}
    .card-title{font-family:'DM Serif Display',serif;font-size:1.25rem;font-weight:400;}
    .card-desc{font-size:.8rem;color:var(--text2);text-align:center;line-height:1.5;}
    .card-badge{font-size:.7rem;padding:4px 12px;border-radius:100px;font-weight:500;letter-spacing:.03em;}
    .admin .card-badge{background:rgba(79,124,255,.15);color:var(--accent);}
    .medico .card-badge{background:rgba(16,185,129,.15);color:var(--success);}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <h1>Sistema de <span>Reclamos</span></h1>
      <p class="subtitle">Informes de RMN — Gestión interna</p>
    </div>
    <div class="cards">
      <a href="pages/administrativo.html" class="role-card admin">
        <div class="card-icon">📋</div>
        <div class="card-title">Administrativo</div>
        <p class="card-desc">Cargá y gestioná informes faltantes o atrasados</p>
        <span class="card-badge">Cargar reclamos</span>
      </a>
      <a href="pages/medico.html" class="role-card medico">
        <div class="card-icon">🩺</div>
        <div class="card-title">Médico</div>
        <p class="card-desc">Revisá los reclamos pendientes y marcá como informado</p>
        <span class="card-badge">Resolver informes</span>
      </a>
    </div>
  </div>
</body>
</html>
