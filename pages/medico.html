<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Médico — Reclamos RMN</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0d0f14;--surface:#13161e;--surface2:#1a1e29;--border:#252a38;
      --accent:#4f7cff;--warn:#f59e0b;--danger:#ef4444;--success:#10b981;
      --recitar:#06b6d4;--text:#e8ecf4;--text2:#8892aa;--text3:#4f5870;--r:12px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;
      border-bottom:1px solid var(--border);background:rgba(13,15,20,.9);
      backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
    .nav-brand{display:flex;align-items:center;gap:10px;}
    .nav-title{font-family:'DM Serif Display',serif;font-size:1.1rem;}
    .nav-badge{font-size:.7rem;background:rgba(16,185,129,.15);color:var(--success);
      padding:3px 10px;border-radius:100px;}
    .pending-pill{font-size:.72rem;background:rgba(239,68,68,.15);color:var(--danger);
      padding:3px 10px;border-radius:100px;font-weight:600;}
    .nav-back{font-size:.8rem;color:var(--text2);text-decoration:none;transition:color .2s;}
    .nav-back:hover{color:var(--text);}
    .nav-right{display:flex;align-items:center;gap:12px;}

    .page{max-width:960px;margin:0 auto;padding:32px 24px;
      display:flex;flex-direction:column;gap:20px;}
    .section-header{display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--border);padding-bottom:14px;}
    .section-title{font-family:'DM Serif Display',serif;font-size:1.3rem;font-weight:400;}

    .search-wrap{position:relative;max-width:420px;width:100%;}
    .search-wrap input{width:100%;padding:9px 14px 9px 36px;background:var(--surface2);
      border:1px solid var(--border);border-radius:100px;color:var(--text);
      font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s;}
    .search-wrap input:focus{border-color:var(--success);}
    .search-wrap input::placeholder{color:var(--text3);}
    .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);
      font-size:13px;color:var(--text3);pointer-events:none;}

    .filters-section{display:flex;flex-direction:column;gap:8px;}
    .filters-label{font-size:.7rem;color:var(--text3);text-transform:uppercase;
      letter-spacing:.04em;font-weight:500;}
    .filters{display:flex;gap:6px;flex-wrap:wrap;}
    .filter-btn{padding:7px 16px;border-radius:100px;border:1px solid var(--border);
      background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;
      font-size:.8rem;cursor:pointer;transition:all .2s;}
    .filter-btn:hover{background:var(--surface2);color:var(--text);}
    .filter-btn.active{background:var(--surface2);color:var(--success);border-color:var(--success);}
    .region-filters{display:flex;gap:6px;flex-wrap:wrap;}
    .region-btn{padding:5px 14px;border-radius:100px;border:1px solid var(--border);
      background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;
      font-size:.75rem;cursor:pointer;transition:all .2s;}
    .region-btn:hover{background:var(--surface2);color:var(--text2);}
    .region-btn.active{background:rgba(79,124,255,.12);color:var(--accent);border-color:var(--accent);}

    .cards-grid{display:flex;flex-direction:column;gap:14px;}
    .reclamo-card{background:var(--surface);border:1px solid var(--border);
      border-radius:16px;padding:20px 24px;
      display:grid;grid-template-columns:1fr auto;gap:20px;transition:border-color .2s;}
    .reclamo-card:hover{border-color:rgba(16,185,129,.3);}
    .reclamo-card.urgente-turno{border-color:rgba(239,68,68,.35);
      background:linear-gradient(135deg,rgba(239,68,68,.04),var(--surface));}
    .reclamo-card.recitado-estado{border-color:rgba(6,182,212,.3);
      background:linear-gradient(135deg,rgba(6,182,212,.04),var(--surface));}
    .reclamo-card.resuelto{opacity:.7;}

    .card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
    .card-num-badge{min-width:38px;height:38px;border-radius:10px;background:var(--surface2);
      display:flex;align-items:center;justify-content:center;font-size:.72rem;
      font-weight:600;color:var(--text2);flex-shrink:0;}
    .card-paciente{font-weight:600;font-size:1rem;}
    .card-dni{font-size:.75rem;color:var(--text3);margin-top:2px;}

    .tipos-reclamo{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
    .tipo-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;
      border-radius:8px;font-size:.8rem;font-weight:600;}
    .tipo-chip.informado{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:var(--warn);}
    .tipo-chip.diagnostico{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);color:#a78bfa;}
    .tipo-chip.turno{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--danger);}

    .card-detail{background:var(--surface2);border-radius:10px;padding:14px;
      display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    .detail-label{font-size:.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
    .detail-value{font-size:.85rem;margin-top:2px;}
    .detail-value.warn{color:var(--warn);}
    .detail-value.danger{color:var(--danger);font-weight:600;}
    .detail-full{grid-column:1/-1;}

    .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
    .badge{font-size:.68rem;padding:3px 8px;border-radius:100px;font-weight:500;}
    .badge-pendiente{background:rgba(245,158,11,.12);color:var(--warn);}
    .badge-resuelto{background:rgba(16,185,129,.12);color:var(--success);}
    .badge-recitado{background:rgba(6,182,212,.12);color:var(--recitar);}
    .badge-dias{background:rgba(255,255,255,.06);color:var(--text2);}
    .badge-origen{background:rgba(255,255,255,.05);color:var(--text3);}

    .region-status-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
    .region-status-badge{font-size:.72rem;padding:3px 10px;border-radius:100px;font-weight:500;}
    .region-status-badge.done{background:rgba(16,185,129,.12);color:var(--success);}
    .region-status-badge.pending{background:rgba(245,158,11,.1);color:var(--warn);}

    .prioridad-bar{height:3px;border-radius:3px;margin-bottom:14px;}
    .prioridad-bar.alta{background:linear-gradient(90deg,var(--danger),rgba(239,68,68,.2));}
    .prioridad-bar.media{background:linear-gradient(90deg,#a78bfa,rgba(167,139,250,.2));}
    .prioridad-bar.normal{background:linear-gradient(90deg,var(--warn),rgba(245,158,11,.2));}
    .prioridad-bar.recitado-bar{background:linear-gradient(90deg,var(--recitar),rgba(6,182,212,.2));}

    .resolve-area{display:flex;flex-direction:column;gap:8px;min-width:200px;}
    textarea.comentario{width:100%;padding:10px 12px;background:var(--surface2);
      border:1px solid var(--border);border-radius:var(--r);color:var(--text);
      font-family:'DM Sans',sans-serif;font-size:.82rem;resize:vertical;min-height:70px;
      outline:none;transition:border-color .2s;}
    textarea.comentario:focus{border-color:var(--success);}
    textarea.comentario::placeholder{color:var(--text3);}
    .btn-resolver{padding:10px 16px;border-radius:var(--r);
      background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);
      color:var(--success);cursor:pointer;font-family:'DM Sans',sans-serif;
      font-size:.82rem;font-weight:500;transition:all .2s;}
    .btn-resolver:hover{background:var(--success);color:#fff;border-color:var(--success);}
    .btn-resolver:disabled{opacity:.5;cursor:not-allowed;}
    .region-resolve-list{display:flex;flex-direction:column;gap:6px;}
    .region-resolve-item{display:flex;align-items:center;justify-content:space-between;
      gap:8px;padding:7px 10px;background:var(--surface);border-radius:8px;
      border:1px solid var(--border);}
    .region-resolve-item.ya-informado{background:rgba(16,185,129,.05);
      border-color:rgba(16,185,129,.2);}
    .region-resolve-name{font-size:.8rem;color:var(--text2);flex:1;}
    .region-resolve-done{font-size:.75rem;color:var(--success);font-weight:500;}
    .btn-resolver-region{padding:5px 12px;border-radius:6px;
      background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);
      color:var(--success);cursor:pointer;font-family:'DM Sans',sans-serif;
      font-size:.75rem;font-weight:500;transition:all .2s;white-space:nowrap;}
    .btn-resolver-region:hover{background:var(--success);color:#fff;}
    .btn-resolver-region:disabled{opacity:.4;cursor:not-allowed;}

    .recitar-divider{height:1px;background:var(--border);margin:6px 0;}
    .btn-recitar{padding:8px 14px;border-radius:var(--r);width:100%;
      background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);
      color:var(--recitar);cursor:pointer;font-family:'DM Sans',sans-serif;
      font-size:.8rem;font-weight:500;transition:all .2s;text-align:left;}
    .btn-recitar:hover{background:rgba(6,182,212,.15);}
    .recitar-form{background:rgba(6,182,212,.05);border:1px solid rgba(6,182,212,.2);
      border-radius:var(--r);padding:10px;display:none;flex-direction:column;gap:8px;
      margin-top:4px;}
    .recitar-form.visible{display:flex;}
    .recitar-form-label{font-size:.72rem;color:var(--recitar);font-weight:600;}
    textarea.recitar-motivo{width:100%;padding:8px 10px;background:var(--surface2);
      border:1px solid rgba(6,182,212,.3);border-radius:8px;color:var(--text);
      font-family:'DM Sans',sans-serif;font-size:.8rem;resize:vertical;min-height:60px;
      outline:none;transition:border-color .2s;}
    textarea.recitar-motivo:focus{border-color:var(--recitar);}
    textarea.recitar-motivo::placeholder{color:var(--text3);}
    .btn-recitar-confirm{padding:8px 14px;border-radius:8px;
      background:var(--recitar);border:none;color:#fff;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;transition:opacity .2s;}
    .btn-recitar-confirm:disabled{opacity:.5;cursor:not-allowed;}

    .resuelto-banner{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);
      border-radius:var(--r);padding:10px 14px;font-size:.8rem;color:var(--success);
      display:flex;flex-direction:column;gap:4px;}

    .recitados-section{display:none;flex-direction:column;gap:12px;
      padding-top:24px;border-top:1px solid rgba(6,182,212,.2);margin-top:8px;}
    .recitados-section-header{display:flex;align-items:center;justify-content:space-between;}
    .recitados-section-title{font-family:'DM Serif Display',serif;font-size:1.1rem;
      font-weight:400;color:var(--recitar);}
    .recitados-section-count{font-size:.8rem;color:var(--text2);}
    .recitado-info-card{background:var(--surface);border:1px solid rgba(6,182,212,.2);
      border-radius:var(--r);padding:14px 18px;display:flex;flex-direction:column;gap:8px;}
    .recitado-motivo-box{font-size:.8rem;color:var(--text2);
      background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.12);
      border-radius:8px;padding:8px 12px;line-height:1.5;}

    .loading{display:flex;align-items:center;justify-content:center;gap:10px;
      padding:60px;color:var(--text2);font-size:.9rem;}
    .spinner{width:20px;height:20px;border:2px solid var(--border);
      border-top-color:var(--success);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;color:var(--text2);padding:60px;}
    .empty span{font-size:3rem;display:block;margin-bottom:12px;}

    .toast{position:fixed;bottom:24px;right:24px;z-index:300;
      background:var(--surface2);border:1px solid rgba(16,185,129,.3);
      border-radius:var(--r);padding:14px 20px;font-size:.875rem;min-width:280px;
      transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.error{border-color:rgba(239,68,68,.3);}
    .toast.warn{border-color:rgba(245,158,11,.3);}

    @media(max-width:640px){
      .reclamo-card{grid-template-columns:1fr;}
      .card-detail{grid-template-columns:1fr;}
      nav{padding:14px 16px;}
      .page{padding:20px 14px;}
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">
      <span>🩺</span>
      <span class="nav-title">Panel Médico</span>
      <span class="nav-badge">Informes RMN</span>
      <span class="pending-pill" id="pendingCount"></span>
    </div>
    <div class="nav-right">
      <button onclick="localStorage.clear();location.reload();"
        style="background:none;border:1px solid #252a38;color:#4f5870;padding:5px 10px;
        border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.72rem;">
        ⚙️ API</button>
      <button onclick="recargar()"
        style="background:none;border:1px solid var(--border);color:var(--text2);
        padding:6px 12px;border-radius:8px;cursor:pointer;
        font-family:'DM Sans',sans-serif;font-size:.8rem;">🔄 Actualizar</button>
      <a href="../index.html" class="nav-back">← Cambiar rol</a>
    </div>
  </nav>

  <div class="page">
    <div class="section-header">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
        <div class="section-title">Reclamos para resolver</div>
        <div id="sectionCount" style="font-size:2.2rem;font-weight:700;color:var(--accent);
          line-height:1;transition:color .3s"></div>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="buscar" placeholder="Buscar por apellido o DNI..." oninput="renderLista()" />
    </div>

    <div class="filters-section">
      <div class="filters-label">Estado</div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFiltro('pendiente',this)">⏳ Pendientes</button>
        <button class="filter-btn" onclick="setFiltro('turno',this)">🚨 Con turno médico</button>
        <button class="filter-btn" onclick="setFiltro('diagnostico',this)">🔬 Diagnóstico</button>
        <button class="filter-btn" onclick="setFiltro('informado',this)">📄 Sin informe</button>
        <button class="filter-btn" onclick="setFiltro('resuelto',this)">✅ Resueltos</button>
        <button class="filter-btn" onclick="setFiltro('todos',this)">Todos</button>
      </div>
      <div class="filters-label">Región del cuerpo</div>
      <div class="region-filters" id="regionFiltros">
        <button class="region-btn active" onclick="setRegion(null,this)">Todas</button>
      </div>
    </div>

    <div class="cards-grid" id="lista">
      <div class="loading"><div class="spinner"></div>Cargando desde Google Sheets...</div>
    </div>

    <div class="recitados-section" id="recitadosSection">
      <div class="recitados-section-header">
        <div class="recitados-section-title">🔄 Pendientes de recitación</div>
        <div class="recitados-section-count" id="recitadosSectionCount"></div>
      </div>
      <div id="listaRecitados"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="../js/api.js"></script>
  <script>
    let filtroActual     = 'pendiente';
    let regionActual     = null;
    let regionesConfig   = {};
    let todosLosReclamos = [];
    let recitadosData    = [];
    const reclamoRegionesMap = {};
    const comentariosTemp    = {}; // ← guarda comentarios entre re-renders

    function setFiltro(f, btn) {
      filtroActual = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLista();
    }

    function setRegion(region, btn) {
      regionActual = region;
      document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLista();
    }

    function cargarFiltrosRegion(regiones) {
      regionesConfig = regiones;
      const contenedor = document.getElementById('regionFiltros');
      const ordenadas  = Object.entries(regiones).sort((a, b) => a[1].numero - b[1].numero);
      contenedor.innerHTML =
        `<button class="region-btn active" onclick="setRegion(null,this)">Todas</button>` +
        ordenadas.map(([nombre]) =>
          `<button class="region-btn" onclick="setRegion('${nombre}',this)">${nombre}</button>`
        ).join('');
    }

    function getRegionesDeEstudio(estudio) {
      const partes = (estudio || '').toLowerCase()
        .split(',').map(p => p.trim()).filter(Boolean);
      const regiones = [];
      Object.entries(regionesConfig).forEach(([region, data]) => {
        const match = partes.some(parte =>
          data.estudios.some(e => parte.includes(e) || e.includes(parte))
        );
        if (match) regiones.push(region);
      });
      return regiones.sort((a, b) =>
        (regionesConfig[a]?.numero || 0) - (regionesConfig[b]?.numero || 0));
    }

    function reclamoEnRegion(r, region) {
      if (!region) return true;
      return getRegionesDeEstudio(r.estudio).includes(region);
    }

    async function recargar() {
      try {
        todosLosReclamos = await getReclamos();
        actualizarPendingBadge();
        if (todosLosReclamos.length === 0) {
          document.getElementById('lista').innerHTML =
            '<div class="empty"><span>📋</span>No hay reclamos activos en la BD.</div>';
          const countEl = document.getElementById('sectionCount');
          countEl.textContent = '0';
          countEl.style.color = 'var(--accent)';
        } else {
          renderLista();
        }
      } catch(e) {
        document.getElementById('lista').innerHTML =
          `<div class="empty"><span>⚠️</span>Error al conectar.<br>
          <small style="color:var(--text3)">${e.message}</small></div>`;
        toast('❌ Error de conexión: ' + e.message, 'error');
      }
      loadRecitadosMedico();
    }

    async function loadRecitadosMedico() {
      try {
        recitadosData = await getRecitados();
        renderRecitadosMedico();
      } catch(e) {
        console.warn('No se pudieron cargar recitados:', e.message);
      }
    }

    function renderRecitadosMedico() {
      const section = document.getElementById('recitadosSection');
      const lista   = document.getElementById('listaRecitados');
      const count   = document.getElementById('recitadosSectionCount');
      if (!recitadosData.length) { section.style.display = 'none'; return; }
      section.style.display = 'flex';
      count.textContent = `${recitadosData.length} paciente${recitadosData.length !== 1 ? 's' : ''} esperando turno`;
      lista.innerHTML = recitadosData.map(r => `
        <div class="recitado-info-card">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="card-num-badge">#${r.nroReclamo || r.id}</div>
            <div style="flex:1">
              <div style="font-weight:600">${r.apellido}, ${r.nombre}</div>
              <div style="font-size:.75rem;color:var(--text3)">DNI ${r.dni} · ${r.estudio}</div>
            </div>
            <span style="font-size:.7rem;background:rgba(6,182,212,.12);color:var(--recitar);
              padding:3px 10px;border-radius:100px;font-weight:600;white-space:nowrap;">
              ${r.recitarCodigo}</span>
          </div>
          <div class="recitado-motivo-box">💬 <strong>Motivo:</strong> ${r.recitarMotivo}</div>
          <div style="font-size:.72rem;color:var(--text3)">
            ⏳ Esperando que el administrativo asigne nuevo turno
          </div>
        </div>`).join('');
    }

    function actualizarPendingBadge() {
      const pend = todosLosReclamos.filter(r => r.estado === 'pendiente').length;
      const el   = document.getElementById('pendingCount');
      el.textContent = pend ? `${pend} pendientes` : '';
    }

    function renderLista() {
      // ── Guardar comentarios antes de re-renderizar ──
      document.querySelectorAll('textarea.comentario').forEach(ta => {
        if (ta.id && ta.value) comentariosTemp[ta.id] = ta.value;
      });
      document.querySelectorAll('textarea.recitar-motivo').forEach(ta => {
        if (ta.id && ta.value) comentariosTemp[ta.id] = ta.value;
      });

      const busq = (document.getElementById('buscar')?.value || '').toLowerCase();
      let data = [...todosLosReclamos];

      if (busq) data = data.filter(r =>
        (r.apellido + ' ' + r.nombre).toLowerCase().includes(busq) ||
        String(r.dni).includes(busq));
      if (regionActual) data = data.filter(r => reclamoEnRegion(r, regionActual));
      if      (filtroActual === 'pendiente')   data = data.filter(r => r.estado === 'pendiente' || r.estado === 'recitado');
      else if (filtroActual === 'turno')       data = data.filter(r => r.reclamoTurno && r.estado === 'pendiente');
      else if (filtroActual === 'diagnostico') data = data.filter(r => r.reclamoDiagnostico && r.estado === 'pendiente');
      else if (filtroActual === 'informado')   data = data.filter(r => r.reclamoInformado && r.estado === 'pendiente');
      else if (filtroActual === 'resuelto')    data = data.filter(r => r.estado === 'resuelto');

      data.sort((a, b) => {
        const pa = prioridad(a), pb = prioridad(b);
        if (pb !== pa) return pb - pa;
        return (b.retraso || 0) - (a.retraso || 0);
      });

      const countEl = document.getElementById('sectionCount');
      countEl.textContent = data.length;
      countEl.style.color = regionActual ? 'var(--success)' : 'var(--accent)';

      const lista = document.getElementById('lista');
      if (!data.length) {
        const msgs = {
          pendiente:'🎉 No hay reclamos pendientes',turno:'✅ Sin turno médico pendiente',
          diagnostico:'✅ Sin reclamos de diagnóstico',informado:'✅ Sin reclamos sin informe',
          resuelto:'📭 No hay reclamos resueltos',todos:'📭 No hay reclamos cargados',
        };
        lista.innerHTML = '<div class="empty"><span>' + (busq ? '🔍' : '📭') + '</span>' +
          (busq ? `Sin resultados para "<strong>${busq}</strong>"` :
          (msgs[filtroActual] || '📭 Sin resultados')) + '</div>';
        return;
      }
      lista.innerHTML = data.map(r => renderCard(r)).join('');

      // ── Restaurar comentarios después de renderizar ──
      setTimeout(() => {
        Object.entries(comentariosTemp).forEach(([id, val]) => {
          const el = document.getElementById(id);
          if (el) el.value = val;
        });
      }, 0);
    }

    function prioridad(r) {
      if (r.reclamoTurno && r.estado !== 'recitado') return 30;
      if (r.estado === 'recitado')   return 25;
      if (r.reclamoDiagnostico)      return 20;
      if (r.reclamoInformado)        return 10;
      return 0;
    }

    function getPrioridadBar(r) {
      if (r.estado === 'recitado')   return '<div class="prioridad-bar recitado-bar"></div>';
      if (r.reclamoTurno)            return '<div class="prioridad-bar alta"></div>';
      if (r.reclamoDiagnostico)      return '<div class="prioridad-bar media"></div>';
      if (r.reclamoInformado)        return '<div class="prioridad-bar normal"></div>';
      return '';
    }

    function renderRegionStatusBadges(r, regiones) {
      if (!regiones.length) return '';
      const regionStatus = r.regionStatus || {};
      if (regiones.length < 2 && !Object.keys(regionStatus).length) return '';
      return `<div class="region-status-row">` +
        regiones.map(reg => {
          const done = regionStatus[reg] === 'Si';
          return `<span class="region-status-badge ${done ? 'done' : 'pending'}">
            ${done ? '✅' : '⏳'} ${reg}</span>`;
        }).join('') + `</div>`;
    }

    function renderResolveArea(r, regiones) {
      const resuelto   = r.estado === 'resuelto';
      const esRecitado = r.estado === 'recitado';

      if (resuelto) {
        return `<div style="display:flex;align-items:flex-start;padding-top:4px">
          <span style="font-size:2rem">✅</span></div>`;
      }

      const regionStatus = r.regionStatus || {};
      const comentario   = `<textarea class="comentario" id="coment-${r.id}"
        placeholder="Comentario sobre el informe..."></textarea>`;

      let resolveButtons = '';
      if (!regiones.length) {
        resolveButtons = `<button class="btn-resolver" id="btn-res-${r.id}"
          onclick="marcarInformado('${r.id}')">✅ Marcar como Informado</button>`;
      } else if (regiones.length === 1) {
        const reg     = regiones[0];
        const yaHecho = regionStatus[reg] === 'Si';
        resolveButtons = yaHecho
          ? `<div class="resuelto-banner">✅ ${reg} informado</div>`
          : `<button class="btn-resolver" id="btn-reg-${r.id}-0"
              onclick="marcarRegionInformada('${r.id}',0)">✅ Informar ${reg}</button>`;
      } else {
        resolveButtons = `<div class="region-resolve-list">` +
          regiones.map((reg, i) => {
            const yaHecho = regionStatus[reg] === 'Si';
            return `<div class="region-resolve-item ${yaHecho ? 'ya-informado' : ''}">
              <span class="region-resolve-name">${reg}</span>
              ${yaHecho
                ? `<span class="region-resolve-done">✅ Informado</span>`
                : `<button class="btn-resolver-region" id="btn-reg-${r.id}-${i}"
                    onclick="marcarRegionInformada('${r.id}',${i})">✅ Informar</button>`}
            </div>`;
          }).join('') + `</div>`;
      }

      const recitarHtml = !esRecitado ? `
        <div class="recitar-divider"></div>
        <button class="btn-recitar" onclick="toggleRecitar('${r.id}')">🔄 Recitar paciente</button>
        <div class="recitar-form" id="recitar-form-${r.id}">
          <div class="recitar-form-label">⚠️ Motivo de recitación (obligatorio)</div>
          <textarea class="recitar-motivo" id="recitar-motivo-${r.id}"
            placeholder="Mala imagen, movimiento, artefacto, etc."></textarea>
          <button class="btn-recitar-confirm" id="btn-rctr-${r.id}"
            onclick="confirmarRecitar('${r.id}')">✔ Confirmar recitar</button>
        </div>` : `
        <div style="margin-top:4px;font-size:.75rem;color:var(--recitar);
          background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.15);
          border-radius:8px;padding:6px 10px;">
          🔄 Recitado · Nuevo turno: ${r.recitarFechaNuevo || 'pendiente'}
        </div>`;

      return `<div class="resolve-area">
        ${comentario}
        ${resolveButtons}
        ${recitarHtml}
      </div>`;
    }

    function renderCard(r) {
      const regiones = getRegionesDeEstudio(r.estudio);
      // Preservar regiones previas si config aún no cargó
      reclamoRegionesMap[r.id] = regiones.length > 0 ? regiones : (reclamoRegionesMap[r.id] || []);
      const regs     = reclamoRegionesMap[r.id];
      const resuelto   = r.estado === 'resuelto';
      const esRecitado = r.estado === 'recitado';
      const esUrgente  = !!r.reclamoTurno && !resuelto && !esRecitado;

      const tiposHtml = [
        r.reclamoTurno
          ? `<div class="tipo-chip turno">🚨 Turno médico${r.reclamoTurno !== 'Si' ? ': ' + r.reclamoTurno : ' próximo'}</div>` : '',
        r.reclamoDiagnostico
          ? `<div class="tipo-chip diagnostico">🔬 Reclamo de diagnóstico</div>` : '',
        r.reclamoInformado
          ? `<div class="tipo-chip informado">📄 Sin informe / fuera de fecha</div>` : '',
      ].join('');

      return `
        <div class="reclamo-card
          ${esUrgente  ? 'urgente-turno'  : ''}
          ${esRecitado ? 'recitado-estado' : ''}
          ${resuelto   ? 'resuelto'        : ''}">
          <div>
            ${getPrioridadBar(r)}
            <div class="card-top">
              <div class="card-num-badge">#${r.nroReclamo || r.id}</div>
              <div>
                <div class="card-paciente">${r.apellido}, ${r.nombre}</div>
                <div class="card-dni">DNI ${r.dni}
                  ${r.origen ? `<span class="badge badge-origen" style="margin-left:8px">${r.origen}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="tipos-reclamo">${tiposHtml}</div>
            ${renderRegionStatusBadges(r, regs)}
            <div class="card-detail">
              <div class="detail-full">
                <div class="detail-label">Estudio</div>
                <div class="detail-value">${r.estudio}</div>
              </div>
              <div>
                <div class="detail-label">Fecha del turno</div>
                <div class="detail-value">${r.fechaEstudio || '—'}</div>
              </div>
              <div>
                <div class="detail-label">Días de retraso</div>
                <div class="detail-value ${r.retraso > 30 ? 'danger' : 'warn'}">${r.retraso || '—'} días</div>
              </div>
              ${r.tipoOrden ? `<div><div class="detail-label">Tipo de orden</div>
                <div class="detail-value">${r.tipoOrden}</div></div>` : ''}
              ${r.fechaReclamo ? `<div><div class="detail-label">Fecha del reclamo</div>
                <div class="detail-value">${r.fechaReclamo}</div></div>` : ''}
              ${r.observaciones ? `<div class="detail-full">
                <div class="detail-label">Observaciones</div>
                <div class="detail-value" style="color:var(--text2)">${r.observaciones}</div>
                </div>` : ''}
            </div>
            <div class="badges">
              ${resuelto   ? '<span class="badge badge-resuelto">✅ Resuelto</span>'  : ''}
              ${esRecitado ? `<span class="badge badge-recitado">🔄 Recitado · Turno: ${r.recitarFechaNuevo || 'pendiente'}</span>` : ''}
              ${!resuelto && !esRecitado ? '<span class="badge badge-pendiente">⏳ Pendiente</span>' : ''}
              ${r.retraso ? `<span class="badge badge-dias">${r.retraso}d</span>` : ''}
            </div>
            ${resuelto && r.comentarioMedico ? `
              <div class="resuelto-banner">
                <strong>✅ Comentario médico:</strong>
                <span>${r.comentarioMedico}</span>
              </div>` : ''}
          </div>
          ${renderResolveArea(r, regs)}
        </div>`;
    }

    async function marcarInformado(id) {
      const comentario = (document.getElementById(`coment-${id}`)?.value || '').trim();
      const btn = document.getElementById(`btn-res-${id}`);
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Guardando...'; }
      delete comentariosTemp[`coment-${id}`];
      try {
        await resolverReclamo(id, comentario);
        await recargar();
        toast('✅ Reclamo marcado como informado.');
      } catch(e) {
        toast('❌ Error: ' + e.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '✅ Marcar como Informado'; }
      }
    }

    async function marcarRegionInformada(id, idx) {
      const todasRegiones = reclamoRegionesMap[id] || [];
      const region = todasRegiones[idx];
      if (!region) {
        toast('❌ Error: región no identificada. Recargá la página.', 'error');
        return;
      }
      const comentario = (document.getElementById(`coment-${id}`)?.value || '').trim();
      const btn = document.getElementById(`btn-reg-${id}-${idx}`);
      if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
      try {
        await resolverRegion(id, region, comentario, todasRegiones);
        delete comentariosTemp[`coment-${id}`];
        await recargar();
        const r = todosLosReclamos.find(x => x.id === id);
        toast(r && r.estado === 'resuelto'
          ? '✅ Todas las regiones informadas — reclamo resuelto.'
          : `✅ ${region} marcado como informado.`);
      } catch(e) {
        toast('❌ Error: ' + e.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '✅ Informar'; }
      }
    }

    function toggleRecitar(id) {
      const form = document.getElementById(`recitar-form-${id}`);
      if (form) form.classList.toggle('visible');
    }

    async function confirmarRecitar(id) {
      const motivoEl = document.getElementById(`recitar-motivo-${id}`);
      const motivo   = (motivoEl?.value || '').trim();
      if (!motivo) { toast('⚠️ El motivo es obligatorio para recitar', 'warn'); return; }
      const btn = document.getElementById(`btn-rctr-${id}`);
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Guardando...'; }
      delete comentariosTemp[`recitar-motivo-${id}`];
      try {
        await recitarReclamo(id, motivo);
        await recargar();
        toast('🔄 Paciente marcado para recitar — el administrativo asignará el nuevo turno.');
      } catch(e) {
        toast('❌ Error: ' + e.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '✔ Confirmar recitar'; }
      }
    }

    let toastTimer;
    function toast(msg, tipo = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast show ${tipo}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
    }

    verificarConfig(async () => {
      await recargar();
      try {
        const regiones = await getConfig();
        if (regiones && Object.keys(regiones).length > 0) {
          cargarFiltrosRegion(regiones);
          renderLista();
        } else {
          console.warn('Config vacío o sin regiones');
        }
      } catch(e) {
        console.warn('Error al cargar regiones:', e.message);
      }
      setInterval(recargar, 30000);
    });
  </script>
</body>
</html>
