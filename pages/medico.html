<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Médico — Reclamos RMN</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0d0f14;--surface:#13161e;--surface2:#1a1e29;--border:#252a38;
      --accent:#4f7cff;--warn:#f59e0b;--danger:#ef4444;--success:#10b981;
      --text:#e8ecf4;--text2:#8892aa;--text3:#4f5870;--r:12px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* ── Nav ── */
    nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;
      border-bottom:1px solid var(--border);background:rgba(13,15,20,.9);
      backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
    .nav-brand{display:flex;align-items:center;gap:10px;}
    .nav-title{font-family:'DM Serif Display',serif;font-size:1.1rem;}
    .nav-badge{font-size:.7rem;background:rgba(16,185,129,.15);color:var(--success);
      padding:3px 10px;border-radius:100px;}
    .pending-pill{font-size:.72rem;background:rgba(239,68,68,.15);color:var(--danger);
      padding:3px 10px;border-radius:100px;font-weight:600;}
    .nav-back{font-size:.8rem;color:var(--text2);text-decoration:none;transition:color .2s;}
    .nav-back:hover{color:var(--text);}
    .nav-right{display:flex;align-items:center;gap:12px;}

    /* ── Page ── */
    .page{max-width:960px;margin:0 auto;padding:32px 24px;
      display:flex;flex-direction:column;gap:24px;}
    .section-header{display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--border);padding-bottom:14px;}
    .section-title{font-family:'DM Serif Display',serif;font-size:1.3rem;font-weight:400;}
    .section-count{font-size:.8rem;color:var(--text2);margin-top:4px;}

    /* ── Filtros ── */
    .filters{display:flex;gap:8px;flex-wrap:wrap;}
    .filter-btn{padding:7px 16px;border-radius:100px;border:1px solid var(--border);
      background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;
      font-size:.8rem;cursor:pointer;transition:all .2s;}
    .filter-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--text3);}
    .filter-btn.active{background:var(--surface2);color:var(--success);border-color:var(--success);}

    /* ── Cards ── */
    .cards-grid{display:flex;flex-direction:column;gap:14px;}
    .reclamo-card{background:var(--surface);border:1px solid var(--border);
      border-radius:16px;padding:20px 24px;
      display:grid;grid-template-columns:1fr auto;gap:20px;transition:border-color .2s;}
    .reclamo-card:hover{border-color:rgba(16,185,129,.3);}
    .reclamo-card.urgente-turno{
      border-color:rgba(239,68,68,.35);
      background:linear-gradient(135deg,rgba(239,68,68,.04),var(--surface));}
    .reclamo-card.resuelto{opacity:.7;}

    /* Card left */
    .card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
    .card-num-badge{min-width:38px;height:38px;border-radius:10px;
      background:var(--surface2);display:flex;align-items:center;
      justify-content:center;font-size:.72rem;font-weight:600;color:var(--text2);
      flex-shrink:0;}
    .card-paciente{font-weight:600;font-size:1rem;}
    .card-dni{font-size:.75rem;color:var(--text3);margin-top:2px;}

    /* Tipos de reclamo — chips prominentes */
    .tipos-reclamo{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
    .tipo-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;
      border-radius:8px;font-size:.8rem;font-weight:600;}
    .tipo-chip.informado{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:var(--warn);}
    .tipo-chip.diagnostico{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);color:#a78bfa;}
    .tipo-chip.turno{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--danger);}

    /* Detail grid */
    .card-detail{background:var(--surface2);border-radius:10px;padding:14px;
      display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    .detail-label{font-size:.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
    .detail-value{font-size:.85rem;margin-top:2px;}
    .detail-value.warn{color:var(--warn);}
    .detail-value.danger{color:var(--danger);font-weight:600;}
    .detail-value.accent{color:var(--accent);}
    .detail-value.success{color:var(--success);}
    .detail-full{grid-column:1/-1;}

    /* Badges */
    .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
    .badge{font-size:.68rem;padding:3px 8px;border-radius:100px;font-weight:500;}
    .badge-pendiente{background:rgba(245,158,11,.12);color:var(--warn);}
    .badge-resuelto{background:rgba(16,185,129,.12);color:var(--success);}
    .badge-dias{background:rgba(255,255,255,.06);color:var(--text2);}
    .badge-origen{background:rgba(255,255,255,.05);color:var(--text3);}

    /* Resolve area */
    .resolve-area{display:flex;flex-direction:column;gap:10px;min-width:220px;}
    textarea.comentario{width:100%;padding:10px 12px;background:var(--surface2);
      border:1px solid var(--border);border-radius:var(--r);color:var(--text);
      font-family:'DM Sans',sans-serif;font-size:.82rem;resize:vertical;min-height:80px;
      outline:none;transition:border-color .2s;}
    textarea.comentario:focus{border-color:var(--success);}
    textarea.comentario::placeholder{color:var(--text3);}
    .btn-resolver{padding:10px 16px;border-radius:var(--r);
      background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);
      color:var(--success);cursor:pointer;font-family:'DM Sans',sans-serif;
      font-size:.82rem;font-weight:500;transition:all .2s;}
    .btn-resolver:hover{background:var(--success);color:#fff;border-color:var(--success);}
    .btn-resolver:disabled{opacity:.5;cursor:not-allowed;}

    /* Resuelto banner */
    .resuelto-banner{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);
      border-radius:var(--r);padding:10px 14px;font-size:.8rem;color:var(--success);
      display:flex;flex-direction:column;gap:4px;}

    /* Prioridad indicator */
    .prioridad-bar{height:3px;border-radius:3px;margin-bottom:14px;}
    .prioridad-bar.alta{background:linear-gradient(90deg,var(--danger),rgba(239,68,68,.2));}
    .prioridad-bar.media{background:linear-gradient(90deg,#a78bfa,rgba(167,139,250,.2));}
    .prioridad-bar.normal{background:linear-gradient(90deg,var(--warn),rgba(245,158,11,.2));}

    /* Loading / Empty */
    .loading{display:flex;align-items:center;justify-content:center;gap:10px;
      padding:60px;color:var(--text2);font-size:.9rem;}
    .spinner{width:20px;height:20px;border:2px solid var(--border);
      border-top-color:var(--success);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;color:var(--text2);padding:60px;}
    .empty span{font-size:3rem;display:block;margin-bottom:12px;}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;z-index:300;
      background:var(--surface2);border:1px solid rgba(16,185,129,.3);
      border-radius:var(--r);padding:14px 20px;font-size:.875rem;min-width:280px;
      transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.error{border-color:rgba(239,68,68,.3);}

    @media(max-width:640px){
      .reclamo-card{grid-template-columns:1fr;}
      .card-detail{grid-template-columns:1fr;}
      nav{padding:14px 16px;}
      .page{padding:20px 14px;}
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">
      <span>🩺</span>
      <span class="nav-title">Panel Médico</span>
      <span class="nav-badge">Informes RMN</span>
      <span class="pending-pill" id="pendingCount"></span>
    </div>
    <div class="nav-right">
      <button onclick="localStorage.clear();location.reload();" style="background:none;border:1px solid #252a38;color:#4f5870;padding:5px 10px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.72rem;" title="Reconfigurar URL de API">⚙️ API</button>
      <button onclick="recargar()"
        style="background:none;border:1px solid var(--border);color:var(--text2);
          padding:6px 12px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;">
        🔄 Actualizar</button>
      <a href="../index.html" class="nav-back">← Cambiar rol</a>
    </div>
  </nav>

  <div class="page">
    <div class="section-header">
      <div>
        <div class="section-title">Reclamos para resolver</div>
        <div class="section-count" id="sectionCount"></div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFiltro('pendiente',this)">⏳ Pendientes</button>
      <button class="filter-btn" onclick="setFiltro('turno',this)">🚨 Con turno médico</button>
      <button class="filter-btn" onclick="setFiltro('diagnostico',this)">🔬 Reclamo diagnóstico</button>
      <button class="filter-btn" onclick="setFiltro('informado',this)">📄 Sin informe</button>
      <button class="filter-btn" onclick="setFiltro('resuelto',this)">✅ Resueltos</button>
      <button class="filter-btn" onclick="setFiltro('todos',this)">Todos</button>
    </div>

    <div class="cards-grid" id="lista">
      <div class="loading">
        <div class="spinner"></div>Cargando desde Google Sheets...
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/api.js"></script>
  <script>
    let filtroActual = 'pendiente';
    let todosLosReclamos = [];

    // ══════════════════════════════════════════════════════════
    // FILTROS
    // ══════════════════════════════════════════════════════════
    function setFiltro(f, btn) {
      filtroActual = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLista();
    }

    // ══════════════════════════════════════════════════════════
    // CARGAR
    // ══════════════════════════════════════════════════════════
    async function recargar() {
      try {
        todosLosReclamos = await getReclamos();
        actualizarPendingBadge();

        if (todosLosReclamos.length === 0) {
          document.getElementById('lista').innerHTML =
            '<div class="empty"><span>📋</span>' +
            'No hay reclamos activos en la BD.<br>' +
            '<small style="color:var(--text3)">Los reclamos aparecen cuando ' +
            'el administrativo carga uno desde su panel.</small></div>';
          document.getElementById('sectionCount').textContent = '0 reclamos';
          return;
        }

        renderLista();
      } catch(e) {
        document.getElementById('lista').innerHTML =
          `<div class="empty"><span>⚠️</span>Error al conectar.<br>
          <small style="color:var(--text3)">${e.message}</small></div>`;
        toast('❌ Error de conexión: ' + e.message, 'error');
      }
    }

    function actualizarPendingBadge() {
      const pend = todosLosReclamos.filter(r => r.estado === 'pendiente').length;
      const el = document.getElementById('pendingCount');
      el.textContent = pend ? `${pend} pendientes` : '';
    }

    // ══════════════════════════════════════════════════════════
    // RENDER
    // ══════════════════════════════════════════════════════════
    function renderLista() {
      let data = [...todosLosReclamos];

      if      (filtroActual === 'pendiente')   data = data.filter(r => r.estado === 'pendiente');
      else if (filtroActual === 'turno')       data = data.filter(r => r.reclamoTurno && r.estado === 'pendiente');
      else if (filtroActual === 'diagnostico') data = data.filter(r => r.reclamoDiagnostico && r.estado === 'pendiente');
      else if (filtroActual === 'informado')   data = data.filter(r => r.reclamoInformado && r.estado === 'pendiente');
      else if (filtroActual === 'resuelto')    data = data.filter(r => r.estado === 'resuelto');

      // Ordenar: turno médico primero → diagnóstico → sin informe → por retraso
      data.sort((a, b) => {
        const prioA = prioridad(a);
        const prioB = prioridad(b);
        if (prioB !== prioA) return prioB - prioA;
        return (b.retraso || 0) - (a.retraso || 0);
      });

      document.getElementById('sectionCount').textContent =
        `${data.length} reclamo${data.length !== 1 ? 's' : ''}`;

      const lista = document.getElementById('lista');
      if (!data.length) {
        const msgs = {
          pendiente:   '🎉 No hay reclamos pendientes',
          turno:       '✅ No hay reclamos con turno médico próximo',
          diagnostico: '✅ No hay reclamos de diagnóstico pendientes',
          informado:   '✅ No hay reclamos sin informe pendientes',
          resuelto:    '📭 No hay reclamos resueltos',
          todos:       '📭 No hay reclamos cargados aún',
        };
        lista.innerHTML =
          '<div class="empty"><span>' +
          (filtroActual === 'pendiente' ? '🎉' : '📭') +
          '</span>' + (msgs[filtroActual] || '📭 Sin resultados') + '</div>';
        return;
      }

      lista.innerHTML = data.map(r => renderCard(r)).join('');
    }

    function prioridad(r) {
      if (r.reclamoTurno)       return 3; // urgente
      if (r.reclamoDiagnostico) return 2;
      if (r.reclamoInformado)   return 1;
      return 0;
    }

    function getPrioridadBar(r) {
      if (r.reclamoTurno)       return '<div class="prioridad-bar alta"></div>';
      if (r.reclamoDiagnostico) return '<div class="prioridad-bar media"></div>';
      if (r.reclamoInformado)   return '<div class="prioridad-bar normal"></div>';
      return '';
    }

    function renderCard(r) {
      const resuelto   = r.estado === 'resuelto';
      const esUrgente  = !!r.reclamoTurno && !resuelto;

      // Chips de tipo de reclamo
      const tiposHtml = [
        r.reclamoTurno
          ? `<div class="tipo-chip turno">
              🚨 Turno médico${r.reclamoTurno !== 'Si' ? ': ' + r.reclamoTurno : ' próximo'}
             </div>` : '',
        r.reclamoDiagnostico
          ? `<div class="tipo-chip diagnostico">🔬 Reclamo de diagnóstico</div>` : '',
        r.reclamoInformado
          ? `<div class="tipo-chip informado">📄 Sin informe / fuera de fecha</div>` : '',
      ].join('');

      return `
        <div class="reclamo-card ${esUrgente ? 'urgente-turno' : ''} ${resuelto ? 'resuelto' : ''}">
          <div>
            ${getPrioridadBar(r)}
            <div class="card-top">
              <div class="card-num-badge">#${r.nroReclamo || r.id}</div>
              <div>
                <div class="card-paciente">${r.apellido}, ${r.nombre}</div>
                <div class="card-dni">DNI ${r.dni}
                  ${r.origen ? `<span class="badge badge-origen" style="margin-left:8px">${r.origen}</span>` : ''}
                </div>
              </div>
            </div>

            <!-- Tipos de reclamo prominentes -->
            <div class="tipos-reclamo">${tiposHtml}</div>

            <!-- Detalle del turno -->
            <div class="card-detail">
              <div class="detail-full">
                <div class="detail-label">Estudio</div>
                <div class="detail-value">${r.estudio}</div>
              </div>
              <div>
                <div class="detail-label">Fecha del turno</div>
                <div class="detail-value">${r.fechaEstudio || '—'}</div>
              </div>
              <div>
                <div class="detail-label">Días de retraso</div>
                <div class="detail-value ${r.retraso > 30 ? 'danger' : 'warn'}">
                  ${r.retraso || '—'} días
                </div>
              </div>
              ${r.tipoOrden ? `
              <div>
                <div class="detail-label">Tipo de orden</div>
                <div class="detail-value">${r.tipoOrden}</div>
              </div>` : ''}
              ${r.fechaReclamo ? `
              <div>
                <div class="detail-label">Fecha del reclamo</div>
                <div class="detail-value">${r.fechaReclamo}</div>
              </div>` : ''}
              ${r.observaciones ? `
              <div class="detail-full">
                <div class="detail-label">Observaciones administrativo</div>
                <div class="detail-value" style="color:var(--text2)">${r.observaciones}</div>
              </div>` : ''}
            </div>

            <div class="badges">
              ${!resuelto
                ? '<span class="badge badge-pendiente">⏳ Pendiente</span>'
                : '<span class="badge badge-resuelto">✅ Resuelto</span>'}
              ${r.retraso ? `<span class="badge badge-dias">${r.retraso}d</span>` : ''}
            </div>

            ${resuelto && r.comentarioMedico ? `
              <div class="resuelto-banner">
                <strong>✅ Comentario médico:</strong>
                <span>${r.comentarioMedico}</span>
              </div>` : ''}
          </div>

          <!-- Área de resolución -->
          ${!resuelto ? `
          <div class="resolve-area">
            <textarea class="comentario" id="coment-${r.id}"
              placeholder="Escribí tu comentario o indicación sobre el informe..."></textarea>
            <button class="btn-resolver" id="btn-res-${r.id}"
              onclick="marcarInformado('${r.id}')">
              ✅ Marcar como Informado
            </button>
          </div>` : `
          <div style="display:flex;align-items:flex-start;padding-top:4px">
            <span style="font-size:2rem">✅</span>
          </div>`}
        </div>`;
    }

    // ══════════════════════════════════════════════════════════
    // MARCAR INFORMADO
    // ══════════════════════════════════════════════════════════
    async function marcarInformado(id) {
      const comentario = (document.getElementById(`coment-${id}`)?.value || '').trim();
      const btn = document.getElementById(`btn-res-${id}`);
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Guardando...'; }
      try {
        await resolverReclamo(id, comentario);
        await recargar();
        toast('✅ Reclamo marcado como informado. El administrativo fue notificado.');
      } catch(e) {
        toast('❌ Error: ' + e.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '✅ Marcar como Informado'; }
      }
    }

    // ══════════════════════════════════════════════════════════
    // TOAST
    // ══════════════════════════════════════════════════════════
    let toastTimer;
    function toast(msg, tipo = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast show ${tipo}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
    }

    // ══════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════
    verificarConfig(() => {
      recargar();
      setInterval(recargar, 30000);
    });
  </script>
</body>
</html>
