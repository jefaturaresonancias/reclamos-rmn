<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="100" fill="#0d0f14"/>
  <!-- Gradiente -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f7cff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Círculo de fondo -->
  <circle cx="256" cy="256" r="200" fill="url(#g)"/>
  <!-- Cruz médica -->
  <rect x="196" y="136" width="120" height="240" rx="20" fill="white"/>
  <rect x="136" y="196" width="240" height="120" rx="20" fill="white"/>
</svg>
